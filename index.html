<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f7f7f5"><title>LoopGrid Studio</title><style>html,body{height:100%;margin:0}body{display:grid;place-items:center;background:#f7f7f5;color:#171717;font:500 16px system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}.loader{display:grid;gap:12px;text-align:center}.spinner{width:30px;height:30px;margin:auto;border:3px solid #ddd;border-top-color:#171717;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><div class="loader"><div class="spinner"></div><div>Opening LoopGrid Studio…</div></div><script>(async()=>{try{const files=["payload/00.txt", "payload/01.txt", "payload/02.txt", "payload/03.txt", "payload/04.txt", "payload/05.txt", "payload/06.txt", "payload/07.txt", "payload/08.txt", "payload/09.txt", "payload/10.txt", "payload/11.txt"];const parts=await Promise.all(files.map(async f=>{const r=await fetch(f);if(!r.ok)throw new Error(`Failed to load ${f}`);return r.text()}));const bytes=Uint8Array.from(atob(parts.join('')),c=>c.charCodeAt(0));const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));const html=await new Response(stream).text();document.open();document.write(html);document.close()}catch(error){console.error(error);document.body.innerHTML='<main style="padding:24px;max-width:440px"><h1 style="font-size:22px">LoopGrid could not open</h1><p>Reload the page in Safari. If the problem continues, clear the website data and try again.</p></main>'}})();</script></body></html>
