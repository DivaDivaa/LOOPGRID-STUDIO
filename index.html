<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>LoopGrid Studio</title>
  <style>
    *{box-sizing:border-box}html,body{height:100%;margin:0}body{display:grid;place-items:center;padding:24px;background:#f5f5f7;color:#171717;font:500 16px system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}.loader{display:grid;gap:14px;text-align:center}.spinner{width:32px;height:32px;margin:auto;border:3px solid #d2d2d7;border-top-color:#171717;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.error{max-width:480px;text-align:left}.error h1{font-size:22px;margin:0 0 10px}.error p{line-height:1.5;color:#555}.error code{font-size:12px;word-break:break-word}.error button{min-height:44px;padding:0 18px;border:0;border-radius:12px;background:#171717;color:white;font:inherit}
  </style>
</head>
<body>
  <main class="loader" id="status"><div class="spinner"></div><div>Opening LoopGrid Studio…</div></main>
  <script>
    (() => {
      const status = document.getElementById('status');
      const decoder = new TextDecoder();
      const u16 = (bytes, offset) => bytes[offset] | (bytes[offset + 1] << 8);
      const u32 = (bytes, offset) => (bytes[offset] | (bytes[offset + 1] << 8) | (bytes[offset + 2] << 16) | (bytes[offset + 3] << 24)) >>> 0;

      async function fetchBytes(path) {
        const response = await fetch(path + '?v=7', { cache: 'no-store' });
        if (!response.ok) throw new Error(`Missing ${path} (${response.status})`);
        return new Uint8Array(await response.arrayBuffer());
      }

      function join(parts) {
        const total = parts.reduce((sum, part) => sum + part.length, 0);
        const result = new Uint8Array(total);
        let offset = 0;
        for (const part of parts) { result.set(part, offset); offset += part.length; }
        return result;
      }

      function readDirectory(zip) {
        let eocd = -1;
        const floor = Math.max(0, zip.length - 65557);
        for (let i = zip.length - 22; i >= floor; i--) {
          if (u32(zip, i) === 0x06054b50) { eocd = i; break; }
        }
        if (eocd < 0) throw new Error('The application archive is not a valid ZIP file.');
        const entryCount = u16(zip, eocd + 10);
        let cursor = u32(zip, eocd + 16);
        const entries = new Map();
        for (let i = 0; i < entryCount; i++) {
          if (u32(zip, cursor) !== 0x02014b50) throw new Error('The ZIP directory is damaged.');
          const method = u16(zip, cursor + 10);
          const compressedSize = u32(zip, cursor + 20);
          const uncompressedSize = u32(zip, cursor + 24);
          const nameLength = u16(zip, cursor + 28);
          const extraLength = u16(zip, cursor + 30);
          const commentLength = u16(zip, cursor + 32);
          const localOffset = u32(zip, cursor + 42);
          const name = decoder.decode(zip.subarray(cursor + 46, cursor + 46 + nameLength));
          entries.set(name, { method, compressedSize, uncompressedSize, localOffset });
          cursor += 46 + nameLength + extraLength + commentLength;
        }
        return entries;
      }

      async function extract(zip, entry) {
        const offset = entry.localOffset;
        if (u32(zip, offset) !== 0x04034b50) throw new Error('A ZIP file entry is damaged.');
        const nameLength = u16(zip, offset + 26);
        const extraLength = u16(zip, offset + 28);
        const start = offset + 30 + nameLength + extraLength;
        const compressed = zip.slice(start, start + entry.compressedSize);
        if (entry.method === 0) return compressed;
        if (entry.method !== 8) throw new Error(`Unsupported ZIP compression method ${entry.method}.`);
        if (!('DecompressionStream' in window)) throw new Error('This Safari version cannot decompress the app. Update iOS and reload.');
        const stream = new Blob([compressed]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
        const output = new Uint8Array(await new Response(stream).arrayBuffer());
        if (entry.uncompressedSize && output.length !== entry.uncompressedSize) throw new Error('A decompressed application file has the wrong size.');
        return output;
      }

      function findEntry(entries, suffix) {
        return [...entries.entries()].find(([name]) => name.endsWith('/' + suffix) || name === suffix);
      }

      async function launch() {
        const paths = ['deploy/part-00.b64', 'deploy/part-01.b64', 'deploy/part-02.b64'];
        const zip = join(await Promise.all(paths.map(fetchBytes)));
        const entries = readDirectory(zip);
        const indexEntry = findEntry(entries, 'index.html');
        const cssEntry = findEntry(entries, 'styles.css');
        const jsEntry = findEntry(entries, 'app.js');
        if (!indexEntry || !cssEntry || !jsEntry) throw new Error('The application archive is missing index.html, styles.css, or app.js.');

        const [pageBytes, cssBytes, jsBytes] = await Promise.all([
          extract(zip, indexEntry[1]),
          extract(zip, cssEntry[1]),
          extract(zip, jsEntry[1])
        ]);
        let page = decoder.decode(pageBytes);
        const cssUrl = URL.createObjectURL(new Blob([cssBytes], { type: 'text/css' }));
        const jsUrl = URL.createObjectURL(new Blob([jsBytes], { type: 'text/javascript' }));
        page = page.replace('href="styles.css"', `href="${cssUrl}"`);
        page = page.replace('src="app.js"', `src="${jsUrl}"`);
        document.open();
        document.write(page);
        document.close();
      }

      launch().catch(error => {
        console.error(error);
        status.className = 'error';
        status.innerHTML = `<h1>LoopGrid could not open</h1><p>${error.message}</p><p>Reload once in Safari. If this message remains, send a screenshot of this exact error.</p><code>${location.href}</code><p><button type="button" onclick="location.reload()">Reload</button></p>`;
      });
    })();
  </script>
</body>
</html>
