name: Install LoopGrid Studio

on:
  push:
    branches: [main]
    paths:
      - 'deploy/**'
      - '.github/workflows/install.yml'

permissions:
  contents: write

jobs:
  install:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruct application
        run: |
          cat deploy/part-*.b64 | tr -d '\n\r ' | base64 --decode > loopgrid.zip
          rm -rf extracted
          mkdir extracted
          unzip -q loopgrid.zip -d extracted
          app_dir="$(find extracted -type f -name index.html -printf '%h\n' | head -n 1)"
          test -n "$app_dir"
          cp "$app_dir/index.html" ./index.html
          cp "$app_dir/styles.css" ./styles.css
          cp "$app_dir/app.js" ./app.js
          if [ -f "$app_dir/README.md" ]; then cp "$app_dir/README.md" ./README.md; fi
          if [ -f "$app_dir/QA_REPORT.md" ]; then cp "$app_dir/QA_REPORT.md" ./QA_REPORT.md; fi
          touch .nojekyll
          rm -rf extracted loopgrid.zip deploy
      - name: Commit installed site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Install LoopGrid Studio site" || exit 0
          git push
